events {}

http {
    upstream my_app_cluster {
        # This points to the Docker Service named "web_app"
        # Docker's internal DNS will distribute traffic to all containers automatically
        server web_app:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_app_cluster;
        }
        
        # We need a stub_status page for Prometheus to read later (Phase 3)
        location /stub_status {
            stub_status;
        }
    }
}