apiVersion: v1
kind: Namespace
metadata:
  name: webapps
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: webapps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: webapps
rules:
  - apiGroups:
        - ""
        - apps
        - autoscaling
        - batch
        - extensions
        - policy
        - rbac.authorization.k8s.io
    resources:
      - pods
      - secrets
      - componentstatuses
      - configmaps
      - daemonsets
      - deployments
      - events
      - endpoints
      - horizontalpodautoscalers
      - ingresses
      - jobs
      - limitranges
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - resourcequotas
      - replicasets
      - replicationcontrollers
      - serviceaccounts
      - services
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rolebinding
  namespace: webapps 
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-role 
subjects:
- namespace: webapps 
  kind: ServiceAccount
  name: jenkins 
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: mysecretname
  namespace: webapps
  annotations:
    kubernetes.io/service-account.name: jenkins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-auto-scaling-app
  namespace: webapps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-auto-scaling
  template:
    metadata:
      labels:
        app: cloud-auto-scaling
    spec:
      serviceAccountName: jenkins
      containers:
      - name: web-app
        image: mahdee07/cloud-auto-scaling:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-auto-scaling-service
  namespace: webapps
spec:
  type: NodePort
  selector:
    app: cloud-auto-scaling
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080