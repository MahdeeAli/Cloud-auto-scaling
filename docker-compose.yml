services:
  # 1. The Target App
  web_app:
    build: .
    deploy:
      replicas: 1

  # 2. The Load Balancer
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web_app

  # 3. The Translator (Nginx -> Prometheus)
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command: -nginx.scrape-uri http://nginx/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx

  # 4. The Database (Stores the metrics)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"