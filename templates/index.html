<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Node Status</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        .icon { font-size: 3rem; margin-bottom: 10px; }
        h1 { color: #0062ff; margin: 10px 0; }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #e6fffa;
            color: #2d6a4f;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .pod-box {
            background: #eef4ff;
            border: 1px solid #cce0ff;
            padding: 15px;
            border-radius: 8px;
            color: #004ecc;
            font-family: monospace;
            font-size: 1.1rem;
            word-break: break-all;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6c757d;
        }
        .btn-dashboard {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            background: #0062ff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-dashboard:hover { background: #004ecc; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">☁️</div>
        <h1>AI Cloud Node</h1>
        
        <div class="status-badge">
            <span style="color: #38a169;">●</span> Online
        </div>

        <div class="pod-box">
            {{ pod_name }}
        </div>

        <p class="footer">Processing Node: Active</p>
        
        <a href="/dashboard" class="btn-dashboard">View Scaling Dashboard →</a>
    </div>

</body>
</html>
